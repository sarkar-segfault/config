[colors]
rosewater = #f5e0dc
flamingo = #f2cdcd
pink = #f5c2e7
mauve = #cba6f7
red = #f38ba8
maroon = #eba0ac
peach = #fab387
yellow = #f9e2af
green = #a6e3a1
teal = #94e2d5
sky = #89dceb
sapphire = #74c7ec
blue = #89b4fa
lavender = #b4befe
text = #cdd6f4
subtext1 = #bac2de
subtext0 = #a6adc8
overlay2 = #9399b2
overlay1 = #7f849c
overlay0 = #6c7086
surface2 = #585b70
surface1 = #45475a
surface0 = #313244
base = #1e1e2e
mantle = #181825
crust = #11111b
transparent = #FF00000

[bar/main]
font-0 = "Iosevka Nerd Font Propo:size=12;2"
width = 100%
height = 28
fixed-center = true

background = ${colors.base}
foreground = ${colors.text}

enable-ipc = true
wm-restack = bspwm

modules-left = bspwm
modules-center = xwindow
modules-right = wlan sep pulseaudio sep backlight sep battery sep date

[module/bspwm]
type = internal/bspwm

pin-workspaces = true

label-focused = %name%
label-focused-padding = 1.2
label-focused-background = ${colors.lavender}
label-focused-foreground = ${colors.base}

label-occupied = %name%
label-occupied-padding = 1.2
label-occupied-foreground = ${colors.text}
label-occupied-background = ${colors.surface0}

label-empty = %name%
label-empty-padding = 1.2
label-empty-foreground = ${colors.overlay0}
label-empty-background = ${colors.base}

label-urgent = %name%
label-urgent-padding = 1.2
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.base}

[module/xwindow]
type = internal/xwindow

label = %title:0:64:...%

[module/sep]
type = custom/text
content = "  "

[module/wlan]
type = internal/network

interface = wlan0

format-connected = " <label-connected>"
label-connected = %signal%%

format-disconnected = "󰖪 disconnected"

[module/pulseaudio]
type = internal/pulseaudio

format-volume = " <label-volume>"
label-volume = %percentage%%

label-muted = "󰖁 muted"

[module/backlight]
type = internal/backlight

card = intel_backlight

format = " <label>"
label = %percentage%%

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

full-at = 99

format-charging = " <label-charging>"
label-charging = %percentage%%

format-discharging = " <label-discharging>"
label-discharging = %percentage%%

format-full = " 100%"

[module/date]
type = internal/date

interval = 1

date = %d-%m-%Y
time = %H:%M:%S

label = "%date% %time%"
