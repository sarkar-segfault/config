backend = "glx";
vsync = true;

fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;

corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

shadow = false;

opacity-rule = [
  "90:class_g = 'Alacritty' && focused",
  "85:class_g = 'Alacritty' && !focused"
];
